{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<section class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-lg border-0 rounded-4 p-4">
      <div class="text-center mb-4">
        <h2 class="fw-bold text-warning">Forgot Password 🔑</h2>
        <p class="text-muted mb-0">Enter your username to reset your password</p>
      </div>

      {% if result %}
      <div class="alert alert-danger text-center">{{ result }}</div>
      {% endif %}

      <form method="POST" class="needs-validation" novalidate>
        <div class="form-floating mb-3">
          <input type="text" name="username" id="username" class="form-control rounded-3" placeholder="Username" required>
          <label for="username"><i class="bi bi-person-circle me-2"></i>Username</label>
          <div class="invalid-feedback">Please enter your username.</div>
        </div>

        <button class="btn btn-warning w-100 py-2 fw-semibold rounded-3 shadow-sm" type="submit">
          Proceed
        </button>

        <div class="text-center mt-3">
          <small class="text-muted">
            <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">Back to Login</a>
          </small>
        </div>
      </form>
    </div>
  </div>
</section>

<script>
// Bootstrap validation
(() => {
  'use strict';
  const form = document.querySelector('.needs-validation');
  form.addEventListener('submit', event => {
    if (!form.checkValidity()) {
      event.preventDefault();
      event.stopPropagation();
    }
    form.classList.add('was-validated');
  }, false);
})();
</script>
{% endblock %}
