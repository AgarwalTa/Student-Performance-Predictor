{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<section class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-lg border-0 rounded-4 p-4">
      <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">Welcome Back 👋</h2>
        <p class="text-muted mb-0">Login to continue your journey</p>
      </div>

      {% if result %}
      <div class="alert alert-danger text-center">{{ result }}</div>
      {% endif %}

      <form method="POST" class="needs-validation" novalidate>
        <div class="form-floating mb-3">
          <input type="text" name="username" class="form-control rounded-3" id="username" placeholder="Username" required>
          <label for="username"><i class="bi bi-person me-2"></i>Username</label>
          <div class="invalid-feedback">Please enter your username.</div>
        </div>

        <div class="form-floating mb-3">
          <input type="password" name="password" class="form-control rounded-3" id="password" placeholder="Password" required>
          <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
          <div class="invalid-feedback">Please enter your password.</div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <a href="{{ url_for('forgot_password') }}" class="text-decoration-none small text-primary">Forgot Password?</a>
        </div>

        <button class="btn btn-primary w-100 py-2 fw-semibold rounded-3 shadow-sm">Login</button>

        <div class="text-center mt-3">
          <small class="text-muted">Don't have an account?
            <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold">Register</a>
          </small>
        </div>
      </form>
    </div>
  </div>
</section>

<script>
// Bootstrap form validation
(() => {
  'use strict';
  const forms = document.querySelectorAll('.needs-validation');
  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault();
        event.stopPropagation();
      }
      form.classList.add('was-validated');
    }, false);
  });
})();
</script>
{% endblock %}
