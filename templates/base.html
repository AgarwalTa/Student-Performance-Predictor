<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Student Performance Dashboard" }}</title>

    <!-- Bootstrap & Chart.js -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color, #f8f9fa);
            color: var(--text-color, #333);
            transition: background 0.3s, color 0.3s;
        }
        .navbar {
            background-color: #007bff;
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .dark-mode {
            --bg-color: #121212;
            --text-color: #f5f5f5;
        }
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🎓 Student Dashboard</a>
        <div>
            <a href="/user_dashboard" class="nav-link d-inline">Home</a>
            {% if session.get('role') == 'admin' %}
            <a href="/admin_dashboard" class="nav-link d-inline">Admin</a>
            {% endif %}
            <a href="/logout" class="nav-link d-inline">Logout</a>
            <button class="btn btn-outline-light btn-sm ms-2" id="themeToggle">🌙</button>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    {% block content %}{% endblock %}
</div>

<div class="footer">
    © {{ now().year }} Student Performance Prediction | Built by Tanisha & Supriya
</div>

<script>
    // Dark/Light mode toggle
    const btn = document.getElementById("themeToggle");
    const body = document.body;
    if (localStorage.getItem("theme") === "dark") {
        body.classList.add("dark-mode");
        btn.textContent = "☀️";
    }
    btn.addEventListener("click", () => {
        body.classList.toggle("dark-mode");
        const mode = body.classList.contains("dark-mode") ? "dark" : "light";
        btn.textContent = mode === "dark" ? "☀️" : "🌙";
        localStorage.setItem("theme", mode);
    });
</script>
</body>
</html>
